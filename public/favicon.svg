<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#1e3a8a" rx="12"/>
  
  <!-- Livro aberto -->
  <g transform="translate(32, 32)">
    <!-- Spine do livro -->
    <rect x="-2" y="-16" width="4" height="32" fill="#1e40af" rx="1"/>
    
    <!-- Página esquerda -->
    <path d="M -16 -14 L -4 -14 L -4 18 L -16 18 Z" fill="#e0e7ff" stroke="#1e40af" stroke-width="1.5"/>
    
    <!-- Página direita -->
    <path d="M 4 -14 L 16 -14 L 16 18 L 4 18 Z" fill="#f5f3ff" stroke="#1e40af" stroke-width="1.5"/>
    
    <!-- Linhas de texto na página esquerda -->
    <line x1="-14" y1="-8" x2="-6" y2="-8" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="-14" y1="-3" x2="-6" y2="-3" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="-14" y1="2" x2="-6" y2="2" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="-14" y1="7" x2="-6" y2="7" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="-14" y1="12" x2="-9" y2="12" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    
    <!-- Linhas de texto na página direita -->
    <line x1="6" y1="-8" x2="14" y2="-8" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="-3" x2="14" y2="-3" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="2" x2="14" y2="2" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="7" x2="14" y2="7" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    <line x1="6" y1="12" x2="11" y2="12" stroke="#1e40af" stroke-width="1.2" opacity="0.6"/>
    
    <!-- Destaque brilho no canto superior direito -->
    <circle cx="12" cy="-10" r="2" fill="white" opacity="0.8"/>
  </g>
</svg>